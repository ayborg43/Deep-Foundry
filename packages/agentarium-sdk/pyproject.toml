[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "deep-foundry-sdk"
version = "0.1.0"
description = "Validate, test, and publish Deep-Foundry skills and capability packs."
requires-python = ">=3.11"
license = { text = "Apache-2.0" }

[project.scripts]
deep-foundry = "agentarium_sdk.cli:main"
agentarium = "agentarium_sdk.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["agentarium_sdk"]
