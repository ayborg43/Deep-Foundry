<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Agentarium Companion</title><style>body{font:15px system-ui;margin:0;background:#0b1020;color:#eef2ff}main{max-width:680px;margin:auto;padding:32px}section{background:#151b2e;border:1px solid #2d3655;border-radius:12px;padding:20px;margin:16px 0}button,input{min-height:44px;border-radius:8px;border:1px solid #536080;padding:0 12px}button{cursor:pointer;background:#7c3aed;color:white;font-weight:600}input{background:#0b1020;color:white;width:70%}code{overflow-wrap:anywhere}</style></head><body><main><h1>Agentarium Companion</h1><p>Local capabilities are denied until you grant a folder or approve a terminal command.</p><section><h2>Folder access</h2><input id="folder" aria-label="Folder path" placeholder="C:\Users\you\Documents"><button id="grant">Grant folder</button></section><section><h2>Terminal approval</h2><input id="command" aria-label="Terminal command" placeholder="git status"><button id="propose">Review command</button><p id="proposal"></p></section><section><h2>Connection</h2><p>Use the cloud app to pair this companion. Grants remain on this device.</p></section><p id="status" role="status"></p><script type="module" src="/src/main.ts"></script></main></body></html>
