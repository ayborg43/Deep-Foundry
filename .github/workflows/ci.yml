name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend (lint + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        working-directory: services/app
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        working-directory: services/app
        run: ruff check .

      - name: Django system check
        working-directory: services/app
        env:
          DJANGO_SECRET_KEY: ci-test-key
          DB_NAME: agentarium
          DB_USER: agentarium
          DB_PASSWORD: agentarium
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
        run: python manage.py check

      - name: Build application image
        run: docker build -t agentarium-app:ci services/app
        # One image, two entrypoint commands (app / worker) per ARCHITECTURE.md §8.3 —
        # building it once here is what both roles are verified against.

  web:
    name: Web (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        working-directory: apps/web
        run: npm ci

      - name: Lint
        working-directory: apps/web
        run: npm run lint

      - name: Build
        working-directory: apps/web
        run: npm run build

  compose-config:
    name: Validate docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose config
        working-directory: infra
        run: docker compose config --quiet
