name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agentarium
          POSTGRES_USER: agentarium
          POSTGRES_PASSWORD: ci-database-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentarium"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    defaults:
      run:
        working-directory: services/app
    env:
      APP_ENV: development
      DJANGO_SECRET_KEY: ci-only-secret-key-that-is-long-enough-for-django-checks
      DJANGO_DEBUG: "false"
      FIELD_ENCRYPTION_KEY: cejGCUCoSNmRYVMLQQQX9KGwbOqCiauvwWsHIWy-RPY=
      DB_NAME: agentarium
      DB_USER: agentarium
      DB_PASSWORD: ci-database-password
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      REDIS_URL: redis://127.0.0.1:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: services/app/requirements.txt
      - run: pip install -r requirements.txt
      - run: python manage.py makemigrations --check --dry-run
      - run: python manage.py test --verbosity 1

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  images:
    runs-on: ubuntu-latest
    needs: [backend, web]
    steps:
      - uses: actions/checkout@v4
      - run: cp infra/.env.example infra/.env
      - run: docker compose -f infra/docker-compose.yml --env-file infra/.env config --quiet
      - run: docker compose -f infra/docker-compose.yml --env-file infra/.env build app web
