# Dokploy deployment stack.
#
# Purpose-built for a Dokploy "Docker Compose" service. Differences vs the
# local infra/docker-compose.yml:
#   * No bundled Traefik `gateway` — Dokploy's shared Traefik does the routing
#     via the labels below (path-split mirrors infra/traefik-dynamic.yml).
#   * No host port publishing — every port is reached over Docker networks.
#     Only `web` and `app` join the external `dokploy-network` so Traefik can
#     reach them; postgres/redis/minio/sandboxd stay private.
#   * Domain + secrets come from the Dokploy Environment editor. Critical ones
#     use ${VAR:?...} so a deploy fails fast with a clear message if unset.
#
# Deploy type MUST be "Docker Compose" (not Swarm): sandboxd needs privileged.
# Point Dokploy's Compose Path at: infra/docker-compose.dokploy.yml
services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-agentarium}
      POSTGRES_USER: ${DB_USER:-agentarium}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in Dokploy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agentarium}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agentarium}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in Dokploy}
    volumes:
      - minio_data:/data

  # Private daemon for one-container-per-call code execution. The host Docker
  # socket is never mounted into the application or this daemon.
  sandboxd:
    image: docker:27.5-dind
    restart: unless-stopped
    privileged: true
    environment:
      DOCKER_TLS_CERTDIR: ""
    command: ["--host=tcp://0.0.0.0:2375", "--host=unix:///var/run/docker.sock"]
    volumes:
      - sandbox_docker_data:/var/lib/docker
    networks:
      - default
      - sandbox_control
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  browser-proxy:
    build:
      context: ../services/browser-proxy
    restart: unless-stopped
    environment:
      BROWSER_PROXY_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in Dokploy}
      PROXY_CONNECT_TIMEOUT_SECONDS: ${PROXY_CONNECT_TIMEOUT_SECONDS:-10}
      PROXY_IDLE_TIMEOUT_SECONDS: ${PROXY_IDLE_TIMEOUT_SECONDS:-20}
      BROWSER_MAX_TRANSFER_BYTES: ${BROWSER_MAX_TRANSFER_BYTES:-26214400}
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 128
    mem_limit: 128m
    cpus: 0.50
    tmpfs:
      - /tmp:size=16m,noexec,nosuid,nodev
    networks:
      - browser_proxy
      - browser_egress

  browserd:
    build:
      context: ../services/browser
    restart: unless-stopped
    environment:
      BROWSER_SERVICE_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in Dokploy}
      BROWSER_PROXY_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in Dokploy}
      BROWSER_PROXY_URL: http://browser-proxy:8080
      BROWSER_TIMEOUT_MS: ${BROWSER_TIMEOUT_MS:-20000}
      BROWSER_MAX_TEXT_CHARS: ${BROWSER_MAX_TEXT_CHARS:-30000}
      BROWSER_MAX_HTML_CHARS: ${BROWSER_MAX_HTML_CHARS:-2000000}
      BROWSER_MAX_REQUESTS: ${BROWSER_MAX_REQUESTS:-100}
      BROWSER_MAX_TRANSFER_BYTES: ${BROWSER_MAX_TRANSFER_BYTES:-26214400}
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 256
    mem_limit: 512m
    cpus: 1.0
    shm_size: 128m
    tmpfs:
      - /tmp:size=128m,nosuid,nodev
      - /home/pwuser/.cache:size=32m,nosuid,nodev
    depends_on:
      - browser-proxy
    networks:
      - browser_control
      - browser_proxy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  app:
    image: agentarium-app:local
    build:
      context: ../services/app
    restart: unless-stopped
    command: >-
      sh -c "python manage.py migrate --noinput &&
      uvicorn config.asgi:application --host 0.0.0.0 --port 8000"
    environment: &app_env
      APP_ENV: ${APP_ENV:-production}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?set DJANGO_SECRET_KEY in Dokploy}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-false}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-${DOMAIN}}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://${DOMAIN}}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://${DOMAIN}}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:?set FIELD_ENCRYPTION_KEY in Dokploy}
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      GOOGLE_OAUTH_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET:-}
      DB_NAME: ${DB_NAME:-agentarium}
      DB_USER: ${DB_USER:-agentarium}
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in Dokploy}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/1
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-agentarium}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD in Dokploy}
      MINIO_BUCKET: ${MINIO_BUCKET:-agentarium-knowledge}
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.smtp.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-localhost}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
      EMAIL_USE_TLS: ${EMAIL_USE_TLS:-true}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-Deep-Foundry <noreply@${DOMAIN}>}
      WEB_APP_URL: ${WEB_APP_URL:-https://${DOMAIN}}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in Dokploy}
      PAYMENTS_CHECKOUT_BASE_URL: ${PAYMENTS_CHECKOUT_BASE_URL:-}
      PAYMENTS_WEBHOOK_SECRET: ${PAYMENTS_WEBHOOK_SECRET:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      WEB_SEARCH_ENDPOINT: ${WEB_SEARCH_ENDPOINT:-https://html.duckduckgo.com/html/}
      WEB_SEARCH_TIMEOUT_SECONDS: ${WEB_SEARCH_TIMEOUT_SECONDS:-10}
      NEWS_SEARCH_ENABLED: ${NEWS_SEARCH_ENABLED:-true}
      NEWS_SEARCH_ENDPOINT: ${NEWS_SEARCH_ENDPOINT:-https://api.gdeltproject.org/api/v2/doc/doc}
      NEWS_SEARCH_TIMEOUT_SECONDS: ${NEWS_SEARCH_TIMEOUT_SECONDS:-15}
      NEWS_SEARCH_TIMESPAN: ${NEWS_SEARCH_TIMESPAN:-7d}
      NEWS_SEARCH_MIN_INTERVAL_SECONDS: ${NEWS_SEARCH_MIN_INTERVAL_SECONDS:-5}
      NEWS_SEARCH_CACHE_SECONDS: ${NEWS_SEARCH_CACHE_SECONDS:-900}
      WEB_READER_TIMEOUT_SECONDS: ${WEB_READER_TIMEOUT_SECONDS:-10}
      WEB_READER_MAX_RESPONSE_BYTES: ${WEB_READER_MAX_RESPONSE_BYTES:-2097152}
      WEB_READER_MAX_TEXT_CHARS: ${WEB_READER_MAX_TEXT_CHARS:-30000}
      WEB_READER_MAX_REDIRECTS: ${WEB_READER_MAX_REDIRECTS:-3}
      WEB_FETCH_TOTAL_TIMEOUT_SECONDS: ${WEB_FETCH_TOTAL_TIMEOUT_SECONDS:-30}
      WEB_DOCUMENT_MAX_RESPONSE_BYTES: ${WEB_DOCUMENT_MAX_RESPONSE_BYTES:-26214400}
      CRAWLER_MAX_PAGES: ${CRAWLER_MAX_PAGES:-50}
      CRAWLER_MAX_DEPTH: ${CRAWLER_MAX_DEPTH:-3}
      CRAWLER_MAX_DURATION_SECONDS: ${CRAWLER_MAX_DURATION_SECONDS:-60}
      CRAWLER_PAGE_CACHE_SECONDS: ${CRAWLER_PAGE_CACHE_SECONDS:-3600}
      BROWSER_SERVICE_URL: http://browserd:3001
      BROWSER_SERVICE_TOKEN: ${INTERNAL_API_TOKEN:?set INTERNAL_API_TOKEN in Dokploy}
      SANDBOX_DOCKER_URL: http://sandboxd:2375
      SANDBOX_IMAGE: ${SANDBOX_IMAGE:-python:3.14-alpine}
      SANDBOX_TIMEOUT_SECONDS: ${SANDBOX_TIMEOUT_SECONDS:-10}
      SANDBOX_MEMORY_BYTES: ${SANDBOX_MEMORY_BYTES:-134217728}
      SANDBOX_NANO_CPUS: ${SANDBOX_NANO_CPUS:-500000000}
      SANDBOX_PIDS_LIMIT: ${SANDBOX_PIDS_LIMIT:-64}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      sandboxd:
        condition: service_healthy
      browserd:
        condition: service_healthy
    networks:
      - default
      - sandbox_control
      - browser_control
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      # Backend owns the API/AI/internal/health paths (priority beats the
      # frontend catch-all). Mirrors infra/traefik-dynamic.yml.
      - "traefik.http.routers.agentarium-backend.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/ai`) || PathPrefix(`/internal`) || Path(`/health`))"
      - traefik.http.routers.agentarium-backend.priority=100
      - traefik.http.routers.agentarium-backend.entrypoints=websecure
      - traefik.http.routers.agentarium-backend.tls=true
      - traefik.http.routers.agentarium-backend.tls.certresolver=${CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.agentarium-backend.loadbalancer.server.port=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; h=os.environ['DJANGO_ALLOWED_HOSTS'].split(',')[0]; r=urllib.request.Request('http://127.0.0.1:8000/health', headers={'Host':h, 'X-Forwarded-Proto':'https'}); urllib.request.urlopen(r, timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    image: agentarium-app:local
    restart: unless-stopped
    command: celery -A config worker --loglevel=info
    environment: *app_env
    depends_on:
      # `started`, not `healthy`: on redeploy a slow app health check must not
      # strand the recreate of its dependents (Traefik still gates traffic on
      # app's own healthcheck). Fresh-boot migrations run in app's command; the
      # DB schema persists across redeploys so an early dependent just retries.
      app:
        condition: service_started
    networks:
      - default
      - sandbox_control
      - browser_control

  beat:
    image: agentarium-app:local
    restart: unless-stopped
    command: celery -A config beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment: *app_env
    depends_on:
      # `started`, not `healthy`: on redeploy a slow app health check must not
      # strand the recreate of its dependents (Traefik still gates traffic on
      # app's own healthcheck). Fresh-boot migrations run in app's command; the
      # DB schema persists across redeploys so an early dependent just retries.
      app:
        condition: service_started
    networks:
      - default
      - sandbox_control

  web:
    image: agentarium-web:local
    build:
      context: ../apps/web
      args:
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
        INTERNAL_API_BASE_URL: http://app:8000
    restart: unless-stopped
    environment:
      INTERNAL_API_BASE_URL: http://app:8000
    depends_on:
      # `started`, not `healthy`: on redeploy a slow app health check must not
      # strand the recreate of its dependents (Traefik still gates traffic on
      # app's own healthcheck). Fresh-boot migrations run in app's command; the
      # DB schema persists across redeploys so an early dependent just retries.
      app:
        condition: service_started
    networks:
      - default
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      # Frontend catch-all (lowest priority — backend paths win above).
      - "traefik.http.routers.agentarium-frontend.rule=Host(`${DOMAIN}`)"
      - traefik.http.routers.agentarium-frontend.priority=1
      - traefik.http.routers.agentarium-frontend.entrypoints=websecure
      - traefik.http.routers.agentarium-frontend.tls=true
      - traefik.http.routers.agentarium-frontend.tls.certresolver=${CERT_RESOLVER:-letsencrypt}
      - traefik.http.services.agentarium-frontend.loadbalancer.server.port=3000
      # Redirect all plain-HTTP traffic for this host to HTTPS.
      - "traefik.http.routers.agentarium-web-insecure.rule=Host(`${DOMAIN}`)"
      - traefik.http.routers.agentarium-web-insecure.entrypoints=web
      - traefik.http.routers.agentarium-web-insecure.middlewares=agentarium-https-redirect
      - traefik.http.middlewares.agentarium-https-redirect.redirectscheme.scheme=https
      - traefik.http.middlewares.agentarium-https-redirect.redirectscheme.permanent=true
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  minio_data:
  sandbox_docker_data:

networks:
  # Private, no external egress: only app/worker/beat + sandboxd.
  sandbox_control:
    internal: true
  browser_control:
    internal: true
  browser_proxy:
    internal: true
  browser_egress:
  # Dokploy's shared Traefik network. Created by Dokploy on install.
  dokploy-network:
    external: true
