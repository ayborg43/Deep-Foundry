services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-agentarium}
      POSTGRES_USER: ${DB_USER:-agentarium}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agentarium}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init/001-enable-pgvector.sql:/docker-entrypoint-initdb.d/001-enable-pgvector.sql:ro
    ports:
      - "${DB_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agentarium}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agentarium}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-agentarium123}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"

  app:
    image: agentarium-app:local
    build:
      context: ../services/app
    restart: unless-stopped
    command: uvicorn config.asgi:application --host 0.0.0.0 --port 8000
    environment: &app_env
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-insecure-dev-key-do-not-use-in-production}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-*}
      DB_NAME: ${DB_NAME:-agentarium}
      DB_USER: ${DB_USER:-agentarium}
      DB_PASSWORD: ${DB_PASSWORD:-agentarium}
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.app.rule=PathPrefix(`/`)"
      - "traefik.http.services.app.loadbalancer.server.port=8000"

  worker:
    image: agentarium-app:local
    restart: unless-stopped
    command: celery -A config worker --loglevel=info
    environment: *app_env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  gateway:
    image: traefik:v3.1
    restart: unless-stopped
    environment:
      DOCKER_API_VERSION: "1.44"
    command:
      - "--providers.docker=true"
      - "--providers.docker.endpoint=unix:///var/run/docker.sock"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "${GATEWAY_PORT:-8080}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - app

volumes:
  postgres_data:
  redis_data:
  minio_data:
